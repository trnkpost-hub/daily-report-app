<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>日報・勤怠管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   CSS Variables & Reset
   ============================================================ */
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --accent: #6b5c4e;
  --accent-light: #8a7b6d;
  --accent-bg: #e8e3dc;
  --text: #3a3530;
  --text-muted: #8a8279;
  --border: #ddd7cf;
  --success: #5a8a5e;
  --danger: #a05a5a;
  --warning: #b8944a;
  --radius: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  min-height: 100dvh;
}

/* ============================================================
   Layout
   ============================================================ */
.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 16px;
}

/* ============================================================
   Header & Navigation
   ============================================================ */
.header {
  text-align: center;
  margin-bottom: 20px;
}
.header h1 {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.05em;
}
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 8px;
}
.date-nav button {
  background: none;
  border: none;
  font-size: 1.2rem;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.2s;
}
.date-nav button:hover { background: var(--accent-bg); }
.date-nav .current-date {
  font-size: 1rem;
  font-weight: 500;
  min-width: 140px;
  text-align: center;
}

/* ============================================================
   Tabs
   ============================================================ */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--accent-bg);
  border-radius: var(--radius);
  padding: 4px;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--accent-light);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
}
.tab-btn.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: var(--shadow);
}

/* ============================================================
   Cards
   ============================================================ */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

/* ============================================================
   Buttons
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-light); }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-outline:hover:not(:disabled) { background: var(--accent-bg); }
.btn-success {
  background: var(--success);
  color: #fff;
}
.btn-danger {
  background: var(--danger);
  color: #fff;
}
.btn-warning {
  background: var(--warning);
  color: #fff;
}
.btn-sm {
  padding: 6px 12px;
  font-size: 0.8rem;
}
.btn-full { width: 100%; }
.btn-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ============================================================
   Work Type Selector
   ============================================================ */
.work-type-selector {
  display: flex;
  gap: 12px;
}
.work-type-btn {
  flex: 1;
  padding: 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.work-type-btn:hover { border-color: var(--accent-light); }
.work-type-btn.selected {
  border-color: var(--accent);
  background: var(--accent-bg);
}
.work-type-btn .icon { font-size: 1.5rem; margin-bottom: 4px; }
.work-type-btn .label { font-size: 0.85rem; font-weight: 500; }

/* ============================================================
   Time Display
   ============================================================ */
.time-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.time-item {
  text-align: center;
  padding: 12px;
  background: var(--bg);
  border-radius: 8px;
}
.time-item .label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.time-item .value {
  font-size: 1.3rem;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.time-item .value.empty { color: var(--text-muted); }

/* ============================================================
   Attendance Summary
   ============================================================ */
.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
}
.summary-row:last-child { border: none; }
.summary-label { color: var(--text-muted); }
.summary-value { font-weight: 600; }

/* ============================================================
   Task List (Daily Report)
   ============================================================ */
.task-section { margin-bottom: 16px; }
.task-section-title {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.task-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.task-input-row input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.task-input-row input:focus { border-color: var(--accent); }

.task-list { list-style: none; }
.task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.task-item:last-child { border: none; }
.task-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}
.task-item .task-text {
  flex: 1;
  font-size: 0.9rem;
}
.task-item .task-text.done {
  text-decoration: line-through;
  color: var(--text-muted);
}
.task-item .badge {
  font-size: 0.65rem;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  background: var(--warning);
  color: #fff;
  flex-shrink: 0;
}
.task-item .delete-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1rem;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color 0.2s;
}
.task-item .delete-btn:hover { color: var(--danger); }

function addCarryoverTask(text) {
  amTasks.push({ text, done: false, carryover: true });
  renderTasks();
  debounceSaveReport();

}

/* =============================================================
   Attendance Actions
   ============================================================= */
function selectWorkType(type) {
  document.getElementById('btn-kumon').classList.toggle('selected', type === 'kumon');
  document.getElementById('btn-other').classList.toggle('selected', type === 'other');

  if (!attendance) {
    attendance = { work_type: type };
  } else {
    attendance.work_type = type;
  }
}

async function clockIn() {
  const now = new Date();
  const dateStr = formatDate(currentDate);
  const workType = attendance?.work_type || 'other';

  // Auto-set end time based on work type
  const autoEnd = new Date(currentDate);
  if (workType === 'kumon') {
    autoEnd.setHours(12, 0, 0, 0);
  } else {
    autoEnd.setHours(17, 30, 0, 0);
  }

  const record = {
    date: dateStr,
    work_type: workType,
    start_time: now.toISOString(),
    end_time: autoEnd.toISOString(),
    break_minutes: 0,
    note: ''
  };

  const { data, error } = await sbClient
    .from('attendance')
    .upsert(record, { onConflict: 'date' })
    .select()
    .single();

  if (error) {
    // Try insert if upsert fails
    const { data: d2, error: e2 } = await sbClient
      .from('attendance')
      .insert(record)
      .select()
      .single();
    if (e2) {
      showStatus('打刻に失敗しました: ' + e2.message, 'error');
      return;
    }
    attendance = d2;
  } else {
    attendance = data;
  }

  renderAttendance();
  showStatus('業務開始を記録しました', 'success');
}

async function breakStartFn() {
  if (!attendance) return;
  // Store break start time temporarily in memory
  attendance._breakStart = new Date();
  document.getElementById('breakStart').textContent = timeStr(attendance._breakStart);
  document.getElementById('breakStart').classList.remove('empty');
  document.getElementById('btnBreakStart').disabled = true;
  document.getElementById('btnBreakEnd').disabled = false;
  showStatus('休憩開始を記録しました', 'success');
}

async function breakEndFn() {
  if (!attendance || !attendance._breakStart) return;
  const now = new Date();
  const breakMin = Math.round((now - attendance._breakStart) / 60000);
  attendance.break_minutes = (attendance.break_minutes || 0) + breakMin;

  document.getElementById('breakEnd').textContent = timeStr(now);
  document.getElementById('breakEnd').classList.remove('empty');
  document.getElementById('btnBreakEnd').disabled = true;
  document.getElementById('btnBreakStart').disabled = false;

  await saveAttendance();
  showStatus(`休憩終了（${breakMin}分）`, 'success');
}

async function clockOut() {
  if (!attendance) return;
  const now = new Date();
  attendance.end_time = now.toISOString();

  // Auto break deduction: 6h+ work = at least 60 min break
  const start = new Date(attendance.start_time);
  const totalMin = (now - start) / 60000;
  if (totalMin >= 360 && (attendance.break_minutes || 0) < 60) {
    attendance.break_minutes = 60;
  }

  await saveAttendance();
  renderAttendance();
  showStatus('業務終了を記録しました', 'success');
}

async function saveAttendance() {
  if (!attendance || !attendance.date) {
    if (!attendance) attendance = {};
    attendance.date = formatDate(currentDate);
  }

  const record = {
    date: attendance.date,
    work_type: attendance.work_type || 'other',
    start_time: attendance.start_time || null,
    end_time: attendance.end_time || null,
    break_minutes: attendance.break_minutes || 0,
    note: document.getElementById('attendanceNote').value || ''
  };

  if (attendance.id) {
    const { error } = await sbClient
      .from('attendance')
      .update(record)
      .eq('id', attendance.id);
    if (error) showStatus('保存に失敗しました', 'error');
  } else {
    const { data, error } = await sbClient
      .from('attendance')
      .insert(record)
      .select()
      .single();
    if (error) {
      showStatus('保存に失敗しました: ' + error.message, 'error');
    } else {
      attendance = data;
    }
  }
}

function debounceSaveAttendance() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveAttendance(), 1000);
}

function updateSummary() {
  if (!attendance || !attendance.start_time || !attendance.end_time) return;

  document.getElementById('summaryCard').style.display = '';
  const start = new Date(attendance.start_time);
  const end = new Date(attendance.end_time);
  const breakMin = attendance.break_minutes || 0;
  const totalMin = Math.round((end - start) / 60000);
  const actualMin = totalMin - breakMin;

  document.getElementById('summaryWorkType').textContent =
    attendance.work_type === 'kumon' ? 'Kumonの日' : 'その他';
  document.getElementById('summaryWorkHours').textContent = formatMinutes(totalMin);
  document.getElementById('summaryBreak').textContent = formatMinutes(breakMin);
  document.getElementById('summaryActual').textContent = formatMinutes(actualMin);
}

function formatMinutes(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h}時間${m > 0 ? m + '分' : ''}`;
}

/* =============================================================
   Time Edit Modal
   ============================================================= */
function openEditModal() {
  const modal = document.getElementById('editModal');
  modal.classList.add('show');

  if (attendance?.start_time) {
    const t = new Date(attendance.start_time);
    document.getElementById('editStartTime').value =
      t.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
  }
  if (attendance?.end_time) {
    const t = new Date(attendance.end_time);
    document.getElementById('editEndTime').value =
      t.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
  }
  document.getElementById('editBreakMin').value = attendance?.break_minutes || 0;
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
}

async function saveEditModal() {
  const startVal = document.getElementById('editStartTime').value;
  const endVal = document.getElementById('editEndTime').value;
  const breakMin = parseInt(document.getElementById('editBreakMin').value) || 0;

  if (!attendance) attendance = { date: formatDate(currentDate), work_type: 'other' };

  if (startVal) {
    const [h, m] = startVal.split(':');
    const d = new Date(currentDate);
    d.setHours(parseInt(h), parseInt(m), 0, 0);
    attendance.start_time = d.toISOString();
  }
  if (endVal) {
    const [h, m] = endVal.split(':');
    const d = new Date(currentDate);
    d.setHours(parseInt(h), parseInt(m), 0, 0);
    attendance.end_time = d.toISOString();
  }
  attendance.break_minutes = breakMin;

  // Auto break deduction check
  if (attendance.start_time && attendance.end_time) {
    const totalMin = (new Date(attendance.end_time) - new Date(attendance.start_time)) / 60000;
    if (totalMin >= 360 && breakMin < 60) {
      attendance.break_minutes = 60;
      document.getElementById('editBreakMin').value = 60;
    }
  }

  await saveAttendance();
  renderAttendance();
  closeEditModal();
  showStatus('時刻を修正しました', 'success');
}

/* =============================================================
   Task Management
   ============================================================= */
function addTask(period) {
  const input = document.getElementById(period + 'TaskInput');
  const text = input.value.trim();
  if (!text) return;

  const tasks = period === 'am' ? amTasks : pmTasks;
  tasks.push({ text, done: false, carryover: false });
  input.value = '';

  renderTasks();
  debounceSaveReport();
}

function toggleTask(period, index) {
  const tasks = period === 'am' ? amTasks : pmTasks;
  tasks[index].done = !tasks[index].done;
  renderTasks();
  debounceSaveReport();
}

function removeTask(period, index) {
  const tasks = period === 'am' ? amTasks : pmTasks;
  tasks.splice(index, 1);
  if (period === 'am') amTasks = tasks;
  else pmTasks = tasks;
  renderTasks();
  debounceSaveReport();
}

function renderTasks() {
  renderTaskList('am', amTasks);
  renderTaskList('pm', pmTasks);
}

function renderTaskList(period, tasks) {
  const list = document.getElementById(period + 'TaskList');
  list.innerHTML = '';
  tasks.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'task-item';
    li.innerHTML = `
      <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${period}', ${i})">
      <span class="task-text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}</span>
      ${t.carryover ? '<span class="badge">繰越</span>' : ''}
      <button class="delete-btn" onclick="removeTask('${period}', ${i})">×</button>
    `;
    list.appendChild(li);
  });
}

/* =============================================================
   Report Generation (via Supabase Edge Function)
   ============================================================= */
async function generateReport() {
  const btn = document.getElementById('btnGenReport');
  const preview = document.getElementById('reportPreview');

  const completedAm = amTasks.filter(t => t.done).map(t => t.text);
  const completedPm = pmTasks.filter(t => t.done).map(t => t.text);
  const incompleteAm = amTasks.filter(t => !t.done).map(t => t.text);
  const incompletePm = pmTasks.filter(t => !t.done).map(t => t.text);

  if (completedAm.length === 0 && completedPm.length === 0) {
    showStatus('完了タスクがありません', 'error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 生成中...';

  try {
    const res = await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({
        date: formatDate(currentDate),
        completed_am: completedAm,
        completed_pm: completedPm,
        incomplete_am: incompleteAm,
        incomplete_pm: incompletePm,
      }),
    });

    if (!res.ok) {
      throw new Error('Edge Function error: ' + res.status);
    }

    const result = await res.json();
    reportText = result.report || '';
    preview.textContent = reportText;
    preview.classList.remove('empty');
    showStatus('日報を生成しました', 'success');
  } catch (e) {
    showStatus('日報生成に失敗しました: ' + e.message, 'error');
    // Fallback: generate simple template locally
    reportText = generateLocalReport(completedAm, completedPm, incompleteAm, incompletePm);
    preview.textContent = reportText;
    preview.classList.remove('empty');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ AIで日報生成';
  }
}

function generateLocalReport(cAm, cPm, iAm, iPm) {
  let report = `【日報】${formatDateDisplay(currentDate)}\n\n`;
  if (cAm.length > 0) {
    report += '■ 午前の実績\n';
    cAm.forEach(t => report += `・${t}\n`);
    report += '\n';
  }
  if (cPm.length > 0) {
    report += '■ 午後の実績\n';
    cPm.forEach(t => report += `・${t}\n`);
    report += '\n';
  }
  const allIncomplete = [...iAm, ...iPm];
  if (allIncomplete.length > 0) {
    report += '■ 翌日への繰越\n';
    allIncomplete.forEach(t => report += `・${t}\n`);
  }
  return report;
}

function renderReport() {
  const preview = document.getElementById('reportPreview');
  if (reportText) {
    preview.textContent = reportText;
    preview.classList.remove('empty');
  } else {
    preview.textContent = '日報を生成するにはタスクを入力して「AIで日報生成」をクリックしてください';
    preview.classList.add('empty');
  }
}

/* =============================================================
   Save Report
   ============================================================= */
async function saveReport() {
  const dateStr = formatDate(currentDate);
  const incomplete = [...amTasks.filter(t => !t.done), ...pmTasks.filter(t => !t.done)];

  // Split report into am/pm summaries
  let amSummary = '';
  let pmSummary = '';
  if (reportText) {
    const parts = reportText.split(/【午後】/);
    amSummary = parts[0]?.replace(/【午前】/, '').replace(/【日報】.*\n\n?/, '').trim() || '';
    pmSummary = parts[1]?.trim() || '';
    // If the split didn't work well, just put everything in am
    if (!pmSummary && !amSummary) {
      amSummary = reportText;
    }
  }

  const record = {
    date: dateStr,
    am_tasks: JSON.stringify(amTasks),
    pm_tasks: JSON.stringify(pmTasks),
    am_summary: amSummary,
    pm_summary: pmSummary,
    carryover: JSON.stringify(incomplete.map(t => t.text)),
  };

  // Check if record exists
  const { data: existing } = await sbClient
    .from('daily_report')
    .select('id')
    .eq('date', dateStr)
    .maybeSingle();

  let error;
  if (existing) {
    ({ error } = await sbClient
      .from('daily_report')
      .update(record)
      .eq('id', existing.id));
  } else {
    ({ error } = await sbClient
      .from('daily_report')
      .insert(record));
  }

  if (error) {
    showStatus('日報の保存に失敗しました: ' + error.message, 'error');
  } else {
    showStatus('日報を保存しました', 'success');
  }
}

function debounceSaveReport() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveReport(), 2000);
}

/* =============================================================
   Utilities
   ============================================================= */
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar show ' + type;
  setTimeout(() => bar.classList.remove('show'), 2500);
}
